<!doctype html>
<html lang="de-CH">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login – SpielplatzAtlas</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        :root {
            --atlas-primary: #0F766E;
            --atlas-secondary: #F59E0B;
            --atlas-bg: #F8FAFC;
            --atlas-text: #0F172A;
        }

        body {
            background: var(--atlas-bg);
            color: var(--atlas-text);
            min-height: 100vh;
        }

        .navbar {
            background: white;
            border-bottom: 1px solid #E2E8F0;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--atlas-primary), var(--atlas-secondary));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .content-card {
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 1.25rem;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.06);
        }

        .btn-atlas-primary {
            background: var(--atlas-primary);
            border-color: var(--atlas-primary);
            color: white;
        }

        .btn-atlas-primary:hover {
            filter: brightness(0.92);
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <span class="brand-mark">A</span>
            <span class="fw-bold">SpielplatzAtlas</span>
        </a>

        <div class="d-flex align-items-center gap-2">
            <a href="/" class="btn btn-sm btn-outline-secondary">Karte</a>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            <div class="mb-4 text-center">
                <div class="text-uppercase fw-semibold small mb-2" style="color: var(--atlas-primary);">
                    Interner Zugang
                </div>
                <h1 class="fw-bold mb-2">Login</h1>
                <p class="text-secondary mb-0">
                    Melden Sie sich mit Ihrer E-Mail-Adresse und Ihrem Passwort an.
                </p>
            </div>

            <div class="content-card p-3 p-lg-4">
                {% if form.errors %}
                    <div class="alert alert-danger">
                        Bitte prüfen Sie E-Mail-Adresse und Passwort.
                    </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label fw-semibold">
                            E-Mail-Adresse
                        </label>
                        <input
                            type="email"
                            name="{{ form.username.html_name }}"
                            id="{{ form.username.id_for_label }}"
                            class="form-control"
                            autocomplete="email"
                            autofocus
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.password.id_for_label }}" class="form-label fw-semibold">
                            Passwort
                        </label>
                        <input
                            type="password"
                            name="{{ form.password.html_name }}"
                            id="{{ form.password.id_for_label }}"
                            class="form-control"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-atlas-primary w-100">
                        Einloggen
                    </button>
                </form>
            </div>

            <p class="text-secondary small mt-3 text-center">
                Öffentliche Besucherinnen und Besucher benötigen kein Benutzerkonto.
            </p>
        </div>
    </div>
</main>

</body>
</html>
