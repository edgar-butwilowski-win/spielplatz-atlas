<!doctype html>
<html lang="de-CH">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpielplatzAtlas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        :root {
            --atlas-primary: #0F766E;
            --atlas-secondary: #F59E0B;
            --atlas-bg: #F8FAFC;
            --atlas-text: #0F172A;
        }

        body {
            background: var(--atlas-bg);
            color: var(--atlas-text);
        }

        .navbar {
            background: white;
            border-bottom: 1px solid #E2E8F0;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--atlas-primary), var(--atlas-secondary));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .btn-atlas-primary {
            background: var(--atlas-primary);
            border-color: var(--atlas-primary);
            color: white;
        }

        .btn-atlas-primary:hover {
            background: #0B5F59;
            border-color: #0B5F59;
            color: white;
        }

        .map-card {
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        #map {
            height: calc(100vh - 178px);
            min-height: 520px;
            width: 100%;
        }

        .leaflet-popup-content {
            margin: 14px 16px;
        }

        .popup-title {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .popup-meta {
            color: #64748B;
            font-size: 0.9rem;
        }

        @media (max-width: 767.98px) {
            #map {
                height: calc(100vh - 198px);
                min-height: 420px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <span class="brand-mark">A</span>
                <span class="fw-bold">SpielplatzAtlas</span>
            </a>

            <div class="d-flex align-items-center gap-2">
                <a href="{% url 'public:about' %}" class="btn btn-sm btn-outline-secondary">Über</a>
                {% if request.user.is_authenticated %}
                <a href="/admin/" class="btn btn-sm btn-outline-secondary">Admin</a>
                {% else %}
                <a href="/admin/" class="btn btn-sm btn-outline-secondary">Login</a>
                {% endif %}
                <a href="{% url 'public:register_organization' %}" class="btn btn-sm btn-atlas-primary">
                    Organisation registrieren
                </a>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-3 px-lg-4 py-3">
        <div class="map-card">
            <div class="p-3 p-lg-4 border-bottom">
                <div class="row g-3 align-items-center">
                    <div class="col-lg-8">
                        <h1 class="h4 fw-bold mb-1">Spielplätze auf der Karte</h1>
                        <div class="text-secondary">
                            Angezeigt werden aktive, öffentlich sichtbare Spielplätze mit Koordinaten.
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <input id="searchInput" type="search" class="form-control"
                            placeholder="Spielplatz, Adresse oder Quartier suchen">
                    </div>
                </div>
            </div>

            <div id="map"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map("map", {
            zoomControl: true,
            scrollWheelZoom: true
        });

        const defaultCenter = [47.4999, 8.7237];
        map.setView(defaultCenter, 13);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap-Mitwirkende"
        }).addTo(map);

        const markersLayer = L.layerGroup().addTo(map);
        let allFeatures = [];

        function markerHtml(feature) {
            const props = feature.properties;
        
            const title = props.name || "Spielplatz";
            const address = props.address || "";
            const district = props.district || "";
            const organization = props.organization || "";
            const detailUrl = props.detail_url || "#";
            const previewPhotoUrl = props.preview_photo_url || "";
        
            const photoHtml = previewPhotoUrl
                ? `
                    <div class="mb-2">
                        <img
                            src="${previewPhotoUrl}"
                            alt="Vorschaubild von ${title}"
                            style="width: 220px; height: 120px; object-fit: cover; border-radius: 0.75rem; display: block;"
                        >
                    </div>
                `
                : "";
                
            return `
                <div style="min-width: 220px;">
                    ${photoHtml}
                    <div class="popup-title">${title}</div>
                    <div class="popup-meta">${address}</div>
                    <div class="popup-meta">${district}</div>
                    <div class="popup-meta mb-2">${organization}</div>
                    <a href="${detailUrl}" class="btn btn-sm btn-atlas-primary">
                        Details anzeigen
                    </a>
                </div>
            `;
        }

        function renderMarkers(features) {
            markersLayer.clearLayers();

            const bounds = [];

            for (const feature of features) {
                const coords = feature.geometry.coordinates;
                const lat = coords[1];
                const lng = coords[0];

                const marker = L.marker([lat, lng]);
                marker.bindPopup(markerHtml(feature));
                marker.addTo(markersLayer);

                bounds.push([lat, lng]);
            }

            if (bounds.length > 0) {
                map.fitBounds(bounds, {
                    padding: [28, 28],
                    maxZoom: 15
                });
            }
        }

        function normalizeText(value) {
            return (value || "").toString().toLowerCase().trim();
        }

        function filterFeatures(query) {
            const q = normalizeText(query);

            if (!q) {
                return allFeatures;
            }

            return allFeatures.filter((feature) => {
                const props = feature.properties;
                const haystack = [
                    props.name,
                    props.address,
                    props.district,
                    props.organization
                ].map(normalizeText).join(" ");

                return haystack.includes(q);
            });
        }

        fetch("{% url 'public:playgrounds_api' %}")
            .then(response => response.json())
            .then(data => {
                allFeatures = data.features || [];
                renderMarkers(allFeatures);
            });

        document.getElementById("searchInput").addEventListener("input", (event) => {
            const filtered = filterFeatures(event.target.value);
            renderMarkers(filtered);
        });
    </script>

</body>

</html>
