<!doctype html>
<html lang="de-CH">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anfrage eingereicht – SpielplatzAtlas</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        :root {
            --atlas-primary: #0F766E;
            --atlas-secondary: #F59E0B;
            --atlas-bg: #F8FAFC;
            --atlas-text: #0F172A;
        }

        body {
            background: var(--atlas-bg);
            color: var(--atlas-text);
        }

        .content-card {
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 1.25rem;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.06);
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--atlas-primary), var(--atlas-secondary));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .btn-atlas-primary {
            background: var(--atlas-primary);
            border-color: var(--atlas-primary);
            color: white;
        }

        .btn-atlas-primary:hover {
            filter: brightness(0.92);
            color: white;
        }
    </style>
</head>
<body>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-xl-6">
            <div class="content-card p-4 p-lg-5 text-center">
                <div class="brand-mark mx-auto mb-3">A</div>

                <h1 class="fw-bold mb-3">Anfrage eingereicht</h1>

                <p class="text-secondary fs-5">
                    Vielen Dank. Ihre Organisationsanfrage wurde gespeichert und wird durch einen Super-Admin geprüft.
                </p>

                <div class="mt-4">
                    <a href="/" class="btn btn-atlas-primary">
                        Zurück zur Karte
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
